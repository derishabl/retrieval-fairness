name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Validate release tag and project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish }}
        run: |
          python - <<'PY'
          import os, re, tomllib, urllib.error, urllib.request
          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", tag):
              raise SystemExit(f"invalid release tag: {tag}")
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          if tag[1:] != version:
              raise SystemExit(f"tag {tag} does not match project version {version}")
          try:
              urllib.request.urlopen(
                  f"https://pypi.org/pypi/retrieval-fairness/{version}/json", timeout=15
              )
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              raise SystemExit(f"retrieval-fairness {version} already exists on PyPI")
          PY
          test "$(git tag --points-at HEAD)" = "$RELEASE_TAG"
      - name: Test and build
        run: |
          python -m pip install -e '.[dev,faiss]'
          ruff check .
          ruff format --check .
          pytest -W error --cov=retrieval_fairness --cov-fail-under=80
          pyright
          python -m build
          twine check dist/*
      - name: Smoke-install wheel
        run: |
          python -m venv /tmp/rf-wheel
          /tmp/rf-wheel/bin/pip install dist/*.whl
          /tmp/rf-wheel/bin/retrieval-fairness --help
          /tmp/rf-wheel/bin/retrieval-fairness demo --top-k 5
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
