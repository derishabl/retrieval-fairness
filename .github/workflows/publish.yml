name: Publish to PyPI

# Публикация через PyPI Trusted Publishing (OIDC, без API-токенов в секретах).
# Настройка (один раз): pypi.org -> Account -> Publishing -> Add pending publisher:
#   project = retrieval-fairness, owner/repo = <ваш GitHub>, workflow = publish.yml,
#   environment = pypi.
# Релиз: git tag v0.1.0 && git push --tags -> создать GitHub Release -> workflow публикует.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Smoke-install wheel
        run: |
          pip install dist/*.whl
          retrieval-fairness --help
          python -c "import retrieval_fairness; print(retrieval_fairness.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # обязательно для trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
