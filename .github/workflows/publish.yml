name: Publish to PyPI

# Публикация через PyPI Trusted Publishing (OIDC, без API-токенов в секретах).
# Настройка (один раз): pypi.org -> Account -> Publishing -> Add pending publisher:
#   project = retrieval-fairness, owner/repo = <ваш GitHub>, workflow = publish.yml,
#   environment = pypi.
# Запуск: GitHub Release ИЛИ вручную (Actions -> Publish to PyPI -> Run workflow).
# Один джоб без артефактов: artifact storage quota не влияет.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # обязательно для trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Smoke-install wheel
        run: |
          pip install dist/*.whl
          retrieval-fairness --help
          python -c "import retrieval_fairness; print(retrieval_fairness.__version__)"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
