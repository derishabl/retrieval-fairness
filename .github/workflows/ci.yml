name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core
        run: python -m pip install -e '.[dev]'
      - name: Install FAISS adapter dependencies
        if: matrix.python-version != '3.9'
        run: python -m pip install -e '.[faiss]'
      - name: Lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Tests with warnings and coverage
        run: pytest -W error --cov=retrieval_fairness --cov-fail-under=80
      - name: Core type check
        if: matrix.python-version == '3.12'
        run: pyright
      - name: Optimized-mode validation smoke
        run: python -O -m pytest tests/test_probe.py tests/test_adapters.py -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Build and inspect distributions
        run: |
          python -m pip install build twine pip-audit
          python -m build
          twine check dist/*
          python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as source:
              dependencies = tomllib.load(source)["project"]["dependencies"]
          with open("/tmp/base-requirements.txt", "w", encoding="utf-8") as target:
              target.write("\n".join(dependencies) + "\n")
          PY
          pip-audit --requirement /tmp/base-requirements.txt
      - name: Run the shipped sdist test suite
        run: |
          mkdir /tmp/rf-sdist
          tar -xzf dist/retrieval_fairness-*.tar.gz -C /tmp/rf-sdist
          cd /tmp/rf-sdist/retrieval_fairness-*
          python -m pip install -e '.[dev,faiss]'
          pytest -q
      - name: Smoke install wheel in a clean venv
        run: |
          python -m venv /tmp/rf-wheel
          /tmp/rf-wheel/bin/pip install dist/*.whl
          /tmp/rf-wheel/bin/retrieval-fairness --help
          /tmp/rf-wheel/bin/retrieval-fairness demo --top-k 5

  audit-extras:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [faiss, pgvector, qdrant, models, fastembed]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Resolve and audit optional dependency set
        env:
          EXTRA: ${{ matrix.extra }}
        run: |
          python -m pip install pip-audit
          python - <<'PY'
          import os, tomllib
          with open("pyproject.toml", "rb") as source:
              project = tomllib.load(source)["project"]
          requirements = project["dependencies"] + project["optional-dependencies"][os.environ["EXTRA"]]
          with open("/tmp/extra-requirements.txt", "w", encoding="utf-8") as target:
              target.write("\n".join(requirements) + "\n")
          PY
          pip-audit --requirement /tmp/extra-requirements.txt

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
