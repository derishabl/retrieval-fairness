name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Tests with warnings and coverage
        run: pytest -W error --cov=retrieval_fairness --cov-fail-under=75
      - name: Optimized-mode validation smoke
        run: python -O -m pytest tests/test_probe.py tests/test_adapters.py -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
      - name: Build and inspect distributions
        run: |
          python -m pip install build twine pip-audit
          python -m build
          twine check dist/*
          python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as source:
              dependencies = tomllib.load(source)["project"]["dependencies"]
          with open("/tmp/base-requirements.txt", "w", encoding="utf-8") as target:
              target.write("\n".join(dependencies) + "\n")
          PY
          pip-audit --requirement /tmp/base-requirements.txt
      - name: Smoke install wheel in a clean venv
        run: |
          python -m venv /tmp/rf-wheel
          /tmp/rf-wheel/bin/pip install dist/*.whl
          /tmp/rf-wheel/bin/retrieval-fairness --help
          /tmp/rf-wheel/bin/retrieval-fairness demo --top-k 5
